<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能派單系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #fbbf24;
            --accent-red: #f87171;
            --accent-blue: #60a5fa;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --log-success: #10b981;
            --log-warning: #f59e0b;
            --log-error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #17223b 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        
        /* 選項二：賽博龐克故障雜訊 */
        /* 替換為：低頻率賽博龐克故障雜訊 (Occasional Glitch) */
        .header h1 {
            font-size: 36px;
            color: var(--accent-gold);
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        .header h1::before, .header h1::after {
            content: "🏰 智能派單";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark); /* 遮蔽底層文字 */
        }

        .header h1::before {
            left: 2px;
            text-shadow: -2px 0 rgba(248, 113, 113, 0.8); /* 紅色偏移 */
            /* 動畫週期拉長至 4 秒 */
            animation: glitch-anim-1 8s infinite linear alternate-reverse;
        }

        .header h1::after {
            left: -2px;
            text-shadow: -2px 0 rgba(96, 165, 250, 0.8); /* 藍色偏移 */
            /* 動畫週期拉長至 5 秒，與紅色錯開產生隨機感 */
            animation: glitch-anim-2 5s infinite linear alternate-reverse;
        }

        /* 關鍵修改：前 70% 的時間隱藏雜訊 (clip成0)，只在特定時間段出現故障 */
        @keyframes glitch-anim-1 {
            0%, 70% { clip: rect(0, 0, 0, 0); }
            75% { clip: rect(15px, 9999px, 44px, 0); }
            80% { clip: rect(65px, 9999px, 11px, 0); }
            85% { clip: rect(43px, 9999px, 56px, 0); }
            90% { clip: rect(89px, 9999px, 73px, 0); }
            95% { clip: rect(22px, 9999px, 98px, 0); }
            100% { clip: rect(53px, 9999px, 21px, 0); }
        }

        @keyframes glitch-anim-2 {
            0%, 60% { clip: rect(0, 0, 0, 0); }
            65% { clip: rect(85px, 9999px, 140px, 0); }
            70% { clip: rect(12px, 9999px, 30px, 0); }
            75% { clip: rect(65px, 9999px, 100px, 0); }
            80% { clip: rect(2px, 9999px, 20px, 0); }
            85% { clip: rect(45px, 9999px, 60px, 0); }
            90%, 100% { clip: rect(0, 0, 0, 0); }
        }

        /* 操作面板 */
        .action-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .action-panel h3 { color: var(--text-main); margin-bottom: 15px; font-size: 18px; }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-unit { background-color: #334155; color: white; }
        .btn-unit:hover { background-color: #475569; transform: translateY(-2px); }
        .btn-skip { background-color: #0d9488; color: white; }
        .btn-skip:hover { background-color: #0f766e; transform: translateY(-2px); }
        .btn-reset { background-color: #991b1b; color: white; margin-left: auto; }
        .btn-reset:hover { background-color: #7f1d1d; }

        /* 三欄資訊看板 */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .card h2 { font-size: 20px; margin-bottom: 15px; text-align: center; padding-bottom: 10px; border-bottom: 2px solid #334155; }
        .card-stats h2 { border-color: var(--accent-gold); color: var(--accent-gold); }
        .card-a h2 { border-color: var(--accent-red); color: var(--accent-red); }
        .card-b h2 { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* 狀態數值 */
        .stat-box {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            text-align: center;
        }
        .stat-label { color: var(--text-muted); font-size: 14px; margin-bottom: 5px; }
        .stat-value { font-size: 28px; font-weight: 900; }
        .gold-text { color: var(--accent-gold); }
        .round-text { color: #a78bfa; }

        /* 產線列隊 */
        .queue-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: flex-start;
        }

        .unit-card {
            background: linear-gradient(to right, #334155, #1e293b);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 24px;
            font-weight: 700;
            animation: slideIn 0.3s ease-out;
            border: 1px solid #475569;
        }

        .empty-queue {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 20px 0;
            font-size: 14px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 日誌區 */
        .logs-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .logs-panel h2 { font-size: 20px; margin-bottom: 15px; color: var(--text-main); }
        
        .logs-content {
            background-color: #0f172a;
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .log-round-block { margin-bottom: 15px; border-left: 3px solid #475569; padding-left: 10px; }
        .log-header { color: #a78bfa; font-weight: bold; margin-bottom: 5px; font-size: 16px; }
        .log-item { display: flex; gap: 8px; }
        .log-bullet { color: #64748b; }
        
        /* 日誌顏色標籤 */
        .text-success { color: var(--log-success); }
        .text-warning { color: var(--log-warning); }
        .text-error { color: var(--log-error); }
        .text-info { color: #38bdf8; }

        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🏰 智能派單</h1>
        </div>

        <div class="action-panel">
            <h3>👇 點擊派發訂單 (推進回合) 👇</h3>
            <div class="btn-group">
                <button class="btn-unit" onclick="playTurn('劍士')">⚔️ 劍士 ($20)</button>
                <button class="btn-unit" onclick="playTurn('弓手')">🏹 弓手 ($30)</button>
                <button class="btn-unit" onclick="playTurn('投石車')">🪨 投石車 ($40)</button>
                <button class="btn-unit" onclick="playTurn('騎士')">🐎 騎士 ($50)</button>
                <button class="btn-skip" onclick="playTurn(null)">⏳ 單純推進時間</button>
                <button class="btn-reset" onclick="resetGame()">🔄 重置系統</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="card card-stats">
                <h2>資源看板</h2>
                <div class="stat-box">
                    <div class="stat-label">💰 剩餘黃金</div>
                    <div class="stat-value gold-text" id="goldDisplay">150</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">⏱ 當前回合</div>
                    <div class="stat-value round-text" id="roundDisplay">0</div>
                </div>
            </div>

            <div class="card card-a">
                <h2>A 廠產線 (上限: 2)</h2>
                <div class="queue-container" id="queueA">
                    <div class="empty-queue">空閒中...</div>
                </div>
            </div>

            <div class="card card-b">
                <h2>B 廠產線 (上限: 2)</h2>
                <div class="queue-container" id="queueB">
                    <div class="empty-queue">空閒中...</div>
                </div>
            </div>
        </div>

        <div class="logs-panel">
            <h2>📜 系統運行日誌</h2>
            <div class="logs-content" id="logBox">
                <div style="color: #64748b; text-align: center; margin-top: 20px;">等待玩家下達指令...</div>
            </div>
        </div>
    </div>

    <script>
        // --- 初始狀態設定 ---
        const INITIAL_GOLD = 150;
        let playerGold = INITIAL_GOLD;
        let queueA = [];
        let queueB = [];
        let roundNum = 0;

        // --- 單位資料庫 ---
        const unitData = {
            "劍士": { cost: 20, emoji: "⚔️" },
            "弓手": { cost: 30, emoji: "🏹" },
            "投石車": { cost: 40, emoji: "🪨" },
            "騎士": { cost: 50, emoji: "🐎" }
        };

        // --- DOM 元素綁定 ---
        const uiGold = document.getElementById('goldDisplay');
        const uiRound = document.getElementById('roundDisplay');
        const uiQueueA = document.getElementById('queueA');
        const uiQueueB = document.getElementById('queueB');
        const uiLogs = document.getElementById('logBox');

        // --- 渲染畫面函數 ---
        function renderUI() {
            uiGold.innerText = playerGold;
            uiRound.innerText = roundNum;

            // 渲染 A 廠
            if (queueA.length === 0) {
                uiQueueA.innerHTML = '<div class="empty-queue">空閒中...</div>';
            } else {
                uiQueueA.innerHTML = queueA.map(u => 
                    `<div class="unit-card">${u.emoji} <span style="font-size: 16px;">${u.name}</span></div>`
                ).join('');
            }

            // 渲染 B 廠
            if (queueB.length === 0) {
                uiQueueB.innerHTML = '<div class="empty-queue">空閒中...</div>';
            } else {
                uiQueueB.innerHTML = queueB.map(u => 
                    `<div class="unit-card">${u.emoji} <span style="font-size: 16px;">${u.name}</span></div>`
                ).join('');
            }
        }

        // --- 核心邏輯：推進一回合 ---
        function playTurn(selectedUnit) {
            // 建立當回合的日誌區塊
            let currentRoundLogs = [];
            
            // 幫助函數：加入單筆日誌
            const addLog = (msg, typeClass) => {
                currentRoundLogs.push(`<div class="log-item"><span class="log-bullet">▶</span><span class="${typeClass}">${msg}</span></div>`);
            };

            // ==========================================
            // 階段 1：偶數回合觸發 Dequeue (出列)
            // ==========================================
            if (roundNum % 2 === 0) {
                if (queueA.length === 0) {
                    addLog("A 廠沒東西可做 (Underflow 防護)", "text-warning");
                } else {
                    let finished = queueA.shift();
                    addLog(`A 廠生產完成: ${finished.emoji} ${finished.name} 出列!`, "text-success");
                }

                if (queueB.length === 0) {
                    addLog("B 廠沒東西可做 (Underflow 防護)", "text-warning");
                } else {
                    let finished = queueB.shift();
                    addLog(`B 廠生產完成: ${finished.emoji} ${finished.name} 出列!`, "text-success");
                }
            }

            // ==========================================
            // 階段 2：處理玩家派單 (Enqueue 檢核邏輯)
            // ==========================================
            if (!selectedUnit) {
                addLog("玩家本回合無動作，單純推進時間", "text-info");
            } else {
                let unit = unitData[selectedUnit];
                
                // 檢核 1：資源檢核
                if (playerGold < unit.cost) {
                    addLog(`黃金不足，無法生產 ${selectedUnit} (需 $${unit.cost})`, "text-error");
                } 
                // 檢核 2：Overflow 防禦 (雙廠皆滿)
                else if (queueA.length >= 2 && queueB.length >= 2) {
                    addLog(`產線全滿！${selectedUnit} 訂單拒絕 (Overflow 防護)`, "text-error");
                } 
                // 檢核 3：負載平衡與派單
                else {
                    playerGold -= unit.cost;
                    let newOrder = { name: selectedUnit, emoji: unit.emoji };

                    // 比較陣列長度，一樣長則優先 A 廠
                    if (queueA.length <= queueB.length && queueA.length < 2) {
                        queueA.push(newOrder);
                        addLog(`${unit.emoji} ${selectedUnit} 分派至 A 廠 (剩餘黃金: $${playerGold})`, "text-success");
                    } else {
                        queueB.push(newOrder);
                        addLog(`${unit.emoji} ${selectedUnit} 分派至 B 廠 (剩餘黃金: $${playerGold})`, "text-success");
                    }
                }
            }

            // ==========================================
            // 階段 3：印出陣列狀態與更新日誌
            // ==========================================
            let aNames = queueA.map(u => u.name);
            let bNames = queueB.map(u => u.name);
            addLog(`陣列狀態 -> A: [${aNames.join(', ')}] | B: [${bNames.join(', ')}]`, "text-muted");

            // 將這回合的日誌組裝並顯示在畫面上
            if (roundNum === 0 && uiLogs.innerText.includes('等待玩家下達指令')) {
                uiLogs.innerHTML = ''; // 清空初始文字
            }

            let logBlock = document.createElement('div');
            logBlock.className = 'log-round-block';
            logBlock.innerHTML = `
                <div class="log-header">--- 第 ${roundNum} 回合 ---</div>
                ${currentRoundLogs.join('')}
            `;
            
            uiLogs.appendChild(logBlock);
            uiLogs.scrollTop = uiLogs.scrollHeight; // 自動捲動到底部

            // 更新畫面與回合數
            renderUI();
            roundNum++;
        }

        // --- 重置遊戲 ---
        function resetGame() {
            playerGold = INITIAL_GOLD;
            queueA = [];
            queueB = [];
            roundNum = 0;
            uiLogs.innerHTML = '<div style="color: #64748b; text-align: center; margin-top: 20px;">系統已重置，等待玩家下達指令...</div>';
            renderUI();
        }

        // 初始化
        renderUI();
    </script>
</body>
</html>
